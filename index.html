<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pink Sound Studui</title>
  <style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
  }

  body {
    background: url('background.jpg') no-repeat center center;
    background-size: cover;
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .icons {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: max(24px, env(safe-area-inset-bottom));
    display: flex;
    gap: 18px;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.28);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .icons a {
    display: inline-flex;
    width: 28px;
    height: 28px;
    opacity: 0.95;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .icons a:hover {
    opacity: 1;
    transform: scale(1.08);
  }

  .icons img {
    width: 100%;
    height: 100%;
    filter: invert(1);
    display: block;
  }

  @media (max-width: 768px) {
    body {
      background-size: contain;
      background-position: center center;
      background-color: #1E2129;
    }

    .icons {
      gap: 16px;
      padding: 10px 14px;
      bottom: max(20px, env(safe-area-inset-bottom));
    }

    .icons a {
      width: 24px;
      height: 24px;
    }
  }
</style>
</head>
<body>
  <div class="icons">
  <a href="https://instagram.com/pinksound.ar" target="_blank" rel="noopener noreferrer">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
  </a>

  <a href="https://www.youtube.com/@lubreath" target="_blank" rel="noopener noreferrer">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
  </a>

  <a href="mailto:info@pinksound.com.ar">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/maildotru.svg">
  </a>
</div>
</body>
</html>
