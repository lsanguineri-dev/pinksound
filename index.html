<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pink Sound Studui</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      background: url('background.jpg') no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .icons {
      margin-bottom: 30px;
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: center;
    }

    .icons a {
      display: inline-flex;
      width: 28px;
      height: 28px;
      opacity: 0.9;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .icons a:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    .icons img {
      width: 100%;
      height: 100%;
      filter: invert(1);
      display: block;
    }

    @media (max-width: 768px) {
      .icons {
        margin-bottom: 24px;
        gap: 16px;
      }

      .icons a {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="icons">
    <a href="https://instagram.com/pinksound.ar" target="_blank" aria-label="Instagram">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram">
    </a>

    <a href="https://www.youtube.com/@lubreath" target="_blank" aria-label="YouTube">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube">
    </a>

    <a href="mailto:info@pinksound.com.ar" aria-label="Email">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/maildotru.svg" alt="Email">
    </a>
  </div>
</body>
</html>
